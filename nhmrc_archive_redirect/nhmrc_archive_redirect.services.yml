services:
  nhmrc_archive_redirect.archived_node_subscriber:
    class: Drupal\nhmrc_archive_redirect\EventSubscriber\ArchivedNodeRedirectSubscriber
    arguments:
      - '@current_route_match'
      - '@config.factory'
      - '@logger.factory'
      - '@current_user'
      - '@path_alias.manager'
      - '@entity_type.manager'
    tags:
      - { name: event_subscriber }

  nhmrc_archive_redirect.deleted_page_subscriber:
    class: Drupal\nhmrc_archive_redirect\EventSubscriber\DeletedPageRedirectSubscriber
    arguments: ['@database', '@config.factory', '@logger.factory', '@current_user']
    tags:
      - { name: event_subscriber }

  nhmrc_archive_redirect.contrib_redirect_bypass_subscriber:
    class: Drupal\nhmrc_archive_redirect\EventSubscriber\ContribRedirectBypassSubscriber
    arguments:
      - '@config.factory'
      - '@module_handler'
      - '@database'
      - '@logger.factory'
      - '@path_alias.manager'
      - '@language_manager'
    tags:
      - { name: event_subscriber }
